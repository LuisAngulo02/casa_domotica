<aside class="remote" aria-label="Control remoto de dispositivos">
  <!-- IR Window -->
  <div class="remote-ir">
    <div class="remote-ir-window"></div>
  </div>

  <!-- Status LED -->
  <div class="remote-top-row">
    <div class="remote-status-led" id="remoteLed"></div>
    <div style="display: flex; gap: 6px; align-items: center;">
      <button id="voiceHelpBtn" class="icon-button" style="padding: 6px; border-radius: 50%; min-width: 28px; min-height: 28px; width: 28px; height: 28px; display: grid; place-items: center;" type="button" aria-label="Ayuda de comandos de voz" title="Comandos soportados">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12" y1="17" y2="17"/></svg>
      </button>
      <button id="voiceBtn" class="remote-voice-btn" type="button" aria-label="Control por voz" title="Control por voz">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
          <line x1="12" x2="12" y1="19" y2="22"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Realtime Sensors Bar (Display Screen effect) -->
  <div class="remote-sensors-bar">
    <div class="remote-sensor-mini" id="mini-temp" title="Temperatura ambiente">
      <span class="sensor-icon"></span>
      <span class="sensor-val" id="mini-temp-val">--.- °C</span>
    </div>
    <div class="remote-sensor-mini" id="mini-ldr" title="Sensor de luz (LDR)">
      <span class="sensor-icon"></span>
      <span class="sensor-val" id="mini-ldr-val">Día</span>
    </div>
    <div class="remote-sensor-mini" id="mini-pir" title="Sensor de movimiento">
      <span class="sensor-icon"></span>
      <span class="sensor-val" id="mini-pir-val">Libre</span>
    </div>
  </div>

  <!-- Device buttons grid -->
  <div id="deviceList" class="remote-grid"></div>

  <!-- Brand -->
  <div class="remote-brand">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>DOMOTICA</span>
  </div>
</aside>

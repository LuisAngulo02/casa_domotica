<section class="topbar" aria-label="Resumen del sistema">
  <div>
    <p class="eyebrow">Sistema inteligente</p>
    <h1>Casa Domótica Inteligente</h1>
  </div>
  
  <!-- Alerta de presencia (PIR) -->
  <div id="pirAlert" class="pir-alert" aria-live="assertive">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12" y1="17" y2="17"/></svg>
    <span>Alerta: Presencia en la entrada</span>
  </div>

  <div style="display: flex; gap: 12px; align-items: center;">
    <button id="refresh" class="icon-button" type="button" aria-label="Sincronizar estados" title="Sincronizar estados">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
    </button>
    <button id="openModal" class="icon-button" type="button" aria-label="Ver historial de eventos" title="Ver historial de eventos">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </button>
    <button id="openSensorModal" class="icon-button" type="button" aria-label="Monitoreo de Sensores" title="Monitoreo de Sensores">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22V4c0-.5.2-1 .6-1.4C5 2.2 5.5 2 6 2h12c.5 0 1 .2 1.4.6.4.4.6.9.6 1.4v18l-4-2-4 2-4-2-4 2z"/><path d="M12 11h.01"/><path d="M12 7h.01"/><path d="M8 11h.01"/><path d="M8 7h.01"/><path d="M16 11h.01"/><path d="M16 7h.01"/><path d="M12 15h.01"/><path d="M8 15h.01"/><path d="M16 15h.01"/></svg>
    </button>
    <button id="themeToggle" class="icon-button" type="button" aria-label="Cambiar tema" title="Cambiar tema">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>
    <div id="systemConnection" class="connection">
      <span class="connection-dot"></span>
      <span>Conectado</span>
    </div>
  </div>
</section>

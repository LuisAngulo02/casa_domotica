{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Casa Domotica Inteligente - Maqueta 3D</title>
  <link rel="stylesheet" href="{% static 'dashboard/styles.css' %}">
</head>
<body>
  <main class="shell">
    <section class="topbar" aria-label="Resumen del sistema">
      <div>
        <p class="eyebrow">Sistema inteligente</p>
        <h1>Casa Domotica Inteligente</h1>
      </div>
      <div class="connection">
        <span class="connection-dot"></span>
        <span>Conectado</span>
      </div>
    </section>

    <section class="workspace">
      <div class="model-card">
        <div class="model-stage" aria-label="Maqueta 3D interactiva de la casa">
          <div class="house-model">
            <div class="outer-frame"></div>
            <button class="pir-sensor lamp-group" type="button" data-device="sensor_pir" aria-label="Sensor PIR" title="Sensor PIR">
              <span class="sensor-eye"></span>
            </button>
            <div class="front-yard">
              <span class="plant plant-a"></span>
              <span class="plant plant-b"></span>
              <span class="plant plant-c"></span>
              <span class="plant plant-d"></span>
              <span class="garden-lamp garden-lamp-left lamp-group lamp-bulb" data-device="luz_jardin"></span>
              <span class="garden-lamp garden-lamp-right lamp-group lamp-bulb" data-device="luz_jardin"></span>
              <span class="walkway"></span>
            </div>

            <div class="floor-grid">
              <button class="room room-bedroom-left lamp-group" type="button" data-device="luz_habitacion_1" aria-label="Habitacion 1">
                <span class="ceiling-light lamp lamp-green"></span>
                <span class="window window-top"></span>
                <span class="bed bed-green"></span>
                <span class="nightstand stand-left"></span>
                <span class="nightstand stand-right"></span>
                <span class="plant pot-left"></span>
              </button>

              <div class="room room-bath" aria-label="Bano">
                <span class="window window-top"></span>
                <span class="toilet"></span>
                <span class="sink"></span>
                <span class="door door-left"></span>
                <span class="door door-right"></span>
              </div>

              <button class="room room-bedroom-right lamp-group" type="button" data-device="luz_habitacion_2" aria-label="Habitacion 2">
                <span class="ceiling-light lamp lamp-green"></span>
                <span class="window window-top"></span>
                <span class="bed bed-purple"></span>
                <span class="nightstand stand-left"></span>
                <span class="nightstand stand-right"></span>
                <span class="plant pot-right"></span>
              </button>

              <button class="room room-kitchen lamp-group" type="button" data-device="luz_cocina" aria-label="Cocina">
                <span class="ceiling-light lamp lamp-green"></span>
                <span class="counter counter-long"></span>
                <span class="counter counter-low"></span>
                <span class="stove"></span>
                <span class="fridge"></span>
              </button>

              <div class="room room-dining" aria-label="Comedor">
                <span class="table"></span>
                <span class="chair chair-n"></span>
                <span class="chair chair-s"></span>
                <span class="chair chair-e"></span>
                <span class="chair chair-w"></span>
                <span class="chair chair-ne"></span>
                <span class="chair chair-sw"></span>
              </div>

              <button class="room room-living lamp-group" type="button" data-device="luz_sala" aria-label="Sala">
                <span class="ceiling-light lamp lamp-green"></span>
                <span class="fan lamp-group" data-device="ventilador" title="Ventilador (Manual)">
                  <span class="fan-blade"></span>
                  <span class="fan-blade"></span>
                </span>
                <span class="sofa sofa-main"></span>
                <span class="sofa sofa-chaise"></span>
                <span class="coffee-table"></span>
                <span class="tv-unit"></span>
                <span class="plant living-plant"></span>
              </button>

              <div class="room room-entry" aria-label="Entrada">
                <button class="front-door lamp-group" type="button" data-device="puerta" aria-label="Puerta principal">
                  <span class="door-leaf"></span>
                  <span class="lamp lamp-red door-indicator"></span>
                </button>
                <button class="lock-chip lamp-group" type="button" data-device="cerradura" aria-label="Cerradura">
                  <span class="lamp lamp-pink lock-indicator"></span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="quick-controls" aria-label="Controles principales">
          <button class="control-btn door-btn" data-device="puerta" type="button">
            <span class="icon" aria-hidden="true">P</span>
            <span class="label">Puerta</span>
          </button>
          <button class="control-btn lock-btn" data-device="cerradura" type="button">
            <span class="icon" aria-hidden="true">C</span>
            <span class="label">Cerradura</span>
          </button>
          <button class="control-btn fan-btn" data-device="ventilador" type="button">
            <span class="icon" aria-hidden="true">V</span>
            <span class="label">Ventilador</span>
          </button>
          <button class="control-btn pir-btn" data-device="sensor_pir" type="button">
            <span class="icon" aria-hidden="true">S</span>
            <span class="label">PIR</span>
          </button>
        </div>
      </div>

      <aside class="panel" aria-label="Estado de dispositivos">
        <div class="panel-header">
          <h2>Control</h2>
          <button id="refresh" class="icon-button" type="button" aria-label="Actualizar estados">R</button>
        </div>
        <div id="deviceList" class="device-list"></div>
        <div class="panel-header history-title">
          <h2>Ultimos eventos</h2>
        </div>
        <div id="history" class="history"></div>
      </aside>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="{% static 'dashboard/app.js' %}"></script>
</body>
</html>

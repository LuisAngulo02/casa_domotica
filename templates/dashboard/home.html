{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Casa Domotica Inteligente - Maqueta 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'dashboard/styles.css' %}">
  <!-- Import map for Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main class="shell">
    <section class="topbar" aria-label="Resumen del sistema">
      <div>
        <p class="eyebrow">Sistema inteligente</p>
        <h1>Casa Domotica Inteligente</h1>
      </div>
      <div style="display: flex; gap: 12px; align-items: center;">
        <button id="refresh" class="icon-button" type="button" aria-label="Sincronizar estados">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
        </button>
        <button id="themeToggle" class="icon-button" type="button" aria-label="Cambiar tema">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
        <div id="systemConnection" class="connection">
          <span class="connection-dot"></span>
          <span>Conectado</span>
        </div>
      </div>
    </section>

    <section class="workspace">
      <div class="model-card">
        <div class="model-stage" aria-label="Maqueta 3D interactiva de la casa">
          <canvas id="three-canvas"></canvas>
        </div>

      </div>

      <!-- Events card below the 3D model -->
      <div class="events-card">
        <div class="events-header">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <h2>Ultimos eventos</h2>
        </div>
        <div id="history" class="events-list"></div>
      </div>

      <aside class="remote" aria-label="Control remoto de dispositivos">
        <!-- IR Window -->
        <div class="remote-ir">
          <div class="remote-ir-window"></div>
        </div>

        <!-- Status LED -->
        <div class="remote-top-row">
          <div class="remote-status-led" id="remoteLed"></div>
          <button id="voiceBtn" class="remote-voice-btn" type="button" aria-label="Control por voz" title="Control por voz">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
              <line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
          </button>
        </div>

        <!-- Device buttons grid -->
        <div id="deviceList" class="remote-grid"></div>

        <!-- Brand -->
        <div class="remote-brand">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>DOMOTICA</span>
        </div>
      </aside>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="{% static 'dashboard/app.js' %}"></script>
</body>
</html>

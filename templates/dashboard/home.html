{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Casa Domotica Inteligente</title>
  <link rel="stylesheet" href="{% static 'dashboard/styles.css' %}">
</head>
<body>
  <main class="shell">
    <section class="topbar" aria-label="Resumen del sistema">
      <div>
        <p class="eyebrow">🏠 Sistema Inteligente</p>
        <h1>Casa Domotica Inteligente</h1>
      </div>
      <div class="connection">
        <span class="connection-dot"></span>
        <span>Conectado</span>
      </div>
    </section>

    <section class="workspace">
      <div class="plan-wrap">
        <div class="house-plan" aria-label="Plano interactivo de la casa">
          <!-- Estructura principal de la casa (vista superior) -->
          <svg viewBox="0 0 100 100" class="floorplan-svg" aria-label="Plano de la casa">
            <!-- Habitación 1 (arriba izquierda) -->
            <g class="room" data-room="1">
              <rect x="5" y="5" width="30" height="30" class="room-bg" />
              <text x="20" y="30" class="room-label">3</text>
            </g>
            <!-- Lámpara Habitación 1 -->
            <g class="lamp-group" data-device="luz_habitacion_1">
              <circle cx="20" cy="15" r="4.5" class="lamp" />
            </g>

            <!-- Habitación 2 (arriba derecha) -->
            <g class="room" data-room="2">
              <rect x="65" y="5" width="30" height="30" class="room-bg" />
              <text x="80" y="30" class="room-label">4</text>
            </g>
            <!-- Lámpara Habitación 2 -->
            <g class="lamp-group" data-device="luz_habitacion_2">
              <circle cx="80" cy="15" r="4.5" class="lamp" />
            </g>

            <!-- Baño (centro arriba) -->
            <g class="room bathroom" data-room="bath">
              <rect x="37" y="5" width="26" height="30" class="room-bg" />
              <text x="50" y="30" class="room-label">2</text>
            </g>

            <!-- Sala (centro) -->
            <g class="room" data-room="3">
              <rect x="5" y="38" width="30" height="35" class="room-bg" />
              <text x="20" y="58" class="room-label">6</text>
            </g>
            <!-- Lámpara Sala -->
            <g class="lamp-group" data-device="luz_sala">
              <circle cx="20" cy="48" r="4.5" class="lamp" />
            </g>

            <!-- Cocina (derecha) -->
            <g class="room" data-room="4">
              <rect x="65" y="38" width="30" height="35" class="room-bg" />
              <text x="80" y="58" class="room-label">5</text>
            </g>
            <!-- Lámpara Cocina -->
            <g class="lamp-group" data-device="luz_cocina">
              <circle cx="80" cy="48" r="4.5" class="lamp" />
            </g>

            <!-- Pasillo (centro) -->
            <g class="room hallway" data-room="hall">
              <rect x="37" y="38" width="26" height="35" class="room-bg" />
              <text x="50" y="58" class="room-label">1</text>
            </g>

            <!-- Entrada (abajo) -->
            <g class="room entrance" data-room="entrance">
              <rect x="20" y="75" width="60" height="20" class="room-bg" />
              <text x="50" y="87" class="room-label">7 - Entrada</text>
            </g>

            <!-- Jardín/Exterior (lado derecho) -->
            <g class="room garden" data-room="garden">
              <rect x="77" y="50" width="18" height="45" class="room-bg" />
              <text x="86" y="80" class="room-label">9</text>
            </g>
            <!-- Lámpara Jardín -->
            <g class="lamp-group outdoor" data-device="luz_jardin">
              <circle cx="86" cy="60" r="3" class="lamp" />
            </g>
          </svg>

          <!-- Controles adicionales debajo del plano -->
          <div class="extra-controls">
            <button class="control-btn door-btn" data-device="puerta" aria-label="Puerta principal">
              <span class="icon">🚪</span>
              <span class="label">Puerta</span>
            </button>
            <button class="control-btn lock-btn" data-device="cerradura" aria-label="Cerradura">
              <span class="icon">🔒</span>
              <span class="label">Cerradura</span>
            </button>
          </div>
        </div>
      </div>

      <aside class="panel" aria-label="Estado de dispositivos">
        <div class="panel-header">
          <h2>📋 Control</h2>
          <button id="refresh" class="icon-button" type="button" aria-label="Actualizar estados">⟳</button>
        </div>
        <div id="deviceList" class="device-list"></div>

        <div class="panel-header history-title">
          <h2>📝 Últimos eventos</h2>
        </div>
        <div id="history" class="history"></div>
      </aside>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="{% static 'dashboard/app.js' %}"></script>
</body>
</html>
